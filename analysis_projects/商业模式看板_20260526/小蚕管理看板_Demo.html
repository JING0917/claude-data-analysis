<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小蚕管理看板</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f0f2f5; color: #333; }

.header { background: linear-gradient(135deg, #1a3a5c 0%, #2563eb 100%); color: #fff; padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; }
.header h1 { font-size: 20px; font-weight: 600; letter-spacing: 1px; }
.header-right { display: flex; align-items: center; gap: 16px; font-size: 13px; }
.header-right select, .header-right button { padding: 6px 14px; border-radius: 4px; border: 1px solid rgba(255,255,255,.25); background: rgba(255,255,255,.12); color: #fff; font-size: 13px; cursor: pointer; }
.header-right select option { color: #333; background: #fff; }
.header-right button { background: rgba(255,255,255,.2); }
.header-right button:hover { background: rgba(255,255,255,.3); }

.tabs { display: flex; background: #fff; padding: 0 24px; border-bottom: 1px solid #e8e8e8; gap: 0; }
.tab { padding: 14px 28px; cursor: pointer; font-size: 14px; font-weight: 500; color: #666; border-bottom: 2px solid transparent; transition: all .2s; }
.tab:hover { color: #2563eb; }
.tab.active { color: #2563eb; border-bottom-color: #2563eb; font-weight: 600; }

.content { padding: 20px 24px; }
.tab-content { display: none; }
.tab-content.active { display: block; }

.kpi-row { display: grid; gap: 16px; margin-bottom: 20px; }
.kpi-row.cols-5 { grid-template-columns: repeat(5, 1fr); }
.kpi-row.cols-4 { grid-template-columns: repeat(4, 1fr); }
.kpi-card { background: #fff; border-radius: 8px; padding: 18px 20px; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
.kpi-card .label { font-size: 13px; color: #8c8c8c; margin-bottom: 8px; }
.kpi-card .value { font-size: 28px; font-weight: 700; color: #1a3a5c; }
.kpi-card .value.red { color: #e74c3c; }
.kpi-card .value.green { color: #27ae60; }
.kpi-card .change { font-size: 12px; margin-top: 3px; }
.kpi-card .change.up { color: #e74c3c; }
.kpi-card .change.down { color: #27ae60; }
.kpi-card .change .arrow { font-weight: 700; }

.chart-grid { display: grid; gap: 16px; margin-bottom: 20px; }
.chart-grid.cols-2 { grid-template-columns: 1fr 1fr; }
.chart-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
.chart-grid.cols-1-2 { grid-template-columns: 1fr 2fr; }
.chart-grid.cols-2-1 { grid-template-columns: 2fr 1fr; }
.chart-panel { background: #fff; border-radius: 8px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
.chart-panel h3 { font-size: 15px; font-weight: 600; color: #1a3a5c; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid #f0f0f0; }
.chart-box { width: 100%; }

.table-wrap { background: #fff; border-radius: 8px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.06); margin-bottom: 20px; }
.table-wrap h3 { font-size: 15px; font-weight: 600; color: #1a3a5c; margin-bottom: 12px; }
.table-wrap table { width: 100%; border-collapse: collapse; font-size: 13px; }
.table-wrap th { background: #f7f8fa; padding: 10px 12px; text-align: left; font-weight: 600; color: #555; border-bottom: 2px solid #e8e8e8; }
.table-wrap td { padding: 10px 12px; border-bottom: 1px solid #f0f0f0; }
.table-wrap tr:hover td { background: #fafbfc; }
.tag { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 11px; font-weight: 600; }
.tag-up { background: #fff2f0; color: #e74c3c; }
.tag-down { background: #f0fff5; color: #27ae60; }
.tag-warn { background: #fffbe6; color: #d4a017; }

/* 视图模式提示 */
.view-mode-hint { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 11px; margin-left: 8px; }
.view-mode-hint.daily { background: #e8f0fe; color: #2563eb; }
.view-mode-hint.weekly { background: #f0fff5; color: #27ae60; }
</style>
</head>
<body>

<div class="header">
  <h1>小蚕经营管理看板</h1>
  <div class="header-right">
    <span>统计日期</span>
    <input type="date" id="sel-start" value="2026-05-25" style="padding:6px 10px;border-radius:4px;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.12);color:#fff;font-size:13px;">
    <span>至</span>
    <input type="date" id="sel-end" value="2026-05-25" style="padding:6px 10px;border-radius:4px;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.12);color:#fff;font-size:13px;">
    <span id="view-mode-hint" class="view-mode-hint daily">日环比+周同比</span>
    <button id="btn-refresh">查询</button>
  </div>
</div>

<div class="tabs">
  <div class="tab active" data-tab="user">用户</div>
  <div class="tab" data-tab="traffic">流量</div>
  <div class="tab" data-tab="order">订单</div>
  <div class="tab" data-tab="marketing">营销</div>
</div>

<div class="content">

<!-- ==================== 用户模块 ==================== -->
<div class="tab-content active" id="tab-user">
  <div class="kpi-row cols-5" id="kpi-user"></div>

  <div class="chart-grid cols-2">
    <div class="chart-panel">
      <h3 id="title-user-dau">DAU 日趋势（近30天）</h3>
      <div class="chart-box" id="chart-user-dau" style="height:340px"></div>
    </div>
    <div class="chart-panel">
      <h3>用户分层构成（自然周日均）</h3>
      <div class="chart-box" id="chart-user-segment" style="height:340px"></div>
    </div>
  </div>

  <div class="chart-grid cols-2">
    <div class="chart-panel">
      <h3 id="title-user-retention">新注册 & 留存率日趋势</h3>
      <div class="chart-box" id="chart-user-retention" style="height:300px"></div>
    </div>
    <div class="chart-panel">
      <h3>活跃天数分布（近30天）</h3>
      <div class="chart-box" id="chart-user-active-dist" style="height:300px"></div>
    </div>
  </div>
</div>

<!-- ==================== 流量模块 ==================== -->
<div class="tab-content" id="tab-traffic">
  <div class="kpi-row cols-5" id="kpi-traffic"></div>

  <div class="chart-grid cols-2">
    <div class="chart-panel">
      <h3 id="title-traffic-pvuv">PV / UV 日趋势（近30天）</h3>
      <div class="chart-box" id="chart-traffic-pvuv" style="height:340px"></div>
    </div>
    <div class="chart-panel">
      <h3>转化漏斗（曝光 → 完单）</h3>
      <div class="chart-box" id="chart-traffic-funnel" style="height:340px"></div>
    </div>
  </div>

  <div class="chart-grid cols-2">
    <div class="chart-panel">
      <h3>流量来源分布</h3>
      <div class="chart-box" id="chart-traffic-source" style="height:300px"></div>
    </div>
    <div class="chart-panel">
      <h3>各页面访问量 Top10</h3>
      <div class="chart-box" id="chart-traffic-page" style="height:300px"></div>
    </div>
  </div>
</div>

<!-- ==================== 订单模块 ==================== -->
<div class="tab-content" id="tab-order">
  <div class="kpi-row cols-5" id="kpi-order"></div>

  <div class="chart-grid cols-2">
    <div class="chart-panel">
      <h3 id="title-order-daily">订单量日趋势（近30天）</h3>
      <div class="chart-box" id="chart-order-daily" style="height:340px"></div>
    </div>
    <div class="chart-panel">
      <h3 id="title-order-gmv">GMV & 客单价日趋势</h3>
      <div class="chart-box" id="chart-order-gmv" style="height:340px"></div>
    </div>
  </div>

  <div class="chart-grid cols-2-1">
    <div class="chart-panel">
      <h3>各业务线订单占比</h3>
      <div class="chart-box" id="chart-order-biz" style="height:300px"></div>
    </div>
    <div class="chart-panel">
      <h3>订单状态分布</h3>
      <div class="chart-box" id="chart-order-status" style="height:300px"></div>
    </div>
  </div>
</div>

<!-- ==================== 营销模块 ==================== -->
<div class="tab-content" id="tab-marketing">
  <div class="kpi-row cols-5" id="kpi-marketing"></div>

  <div class="chart-grid cols-2">
    <div class="chart-panel">
      <h3 id="title-mkt-cost">营销费用日趋势（近30天）</h3>
      <div class="chart-box" id="chart-mkt-cost" style="height:340px"></div>
    </div>
    <div class="chart-panel">
      <h3 id="title-mkt-roi">ROI 日趋势</h3>
      <div class="chart-box" id="chart-mkt-roi" style="height:340px"></div>
    </div>
  </div>

  <div class="chart-grid cols-3">
    <div class="chart-panel">
      <h3>费用构成（按券类型）</h3>
      <div class="chart-box" id="chart-mkt-type" style="height:280px"></div>
    </div>
    <div class="chart-panel">
      <h3>新老客费用占比</h3>
      <div class="chart-box" id="chart-mkt-user" style="height:280px"></div>
    </div>
    <div class="chart-panel">
      <h3>各渠道 ROI 对比</h3>
      <div class="chart-box" id="chart-mkt-channel" style="height:280px"></div>
    </div>
  </div>
</div>

</div><!-- .content -->

<script>
// ============================================================
// 全局状态
// ============================================================
var currentMode = 'daily';   // 'daily' | 'weekly'
var activeTab = 'user';

// ============================================================
// Tab Switch
// ============================================================
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    activeTab = t.dataset.tab;
    document.getElementById('tab-' + activeTab).classList.add('active');
    setTimeout(() => window.dispatchEvent(new Event('resize')), 50);
  });
});

// ============================================================
// 模拟数据生成
// ============================================================
function seedRandom(seed) {
  var x = Math.sin(seed) * 10000;
  return x - Math.floor(x);
}

// 生成30天模拟数据（带种子，保证同一指标每天的值稳定）
function genDailySeries(base, pct, seed) {
  var arr = [];
  for (var i = 0; i < 30; i++) {
    var r = seedRandom(seed + i);
    arr.push(Math.round(base * (1 + (r - 0.5) * pct * 2)));
  }
  return arr;
}

// 日数据生成器
var DAYS_30 = [];
for (var i = 29; i >= 0; i--) {
  var dd = new Date(2026, 4, 26 - i);
  DAYS_30.push({
    label: (dd.getMonth()+1) + '/' + dd.getDate(),
    iso: '2026-05-' + ('0' + dd.getDate()).slice(-2)
  });
}

// 各指标30天序列（用不同seed保证差异化）
var dauSeries       = genDailySeries(1150000, 0.07, 100);
var newUserSeries   = genDailySeries(25100, 0.12, 200);
var ret1Series      = genDailySeries(38.2, 0.06, 300);
var ret7Series      = genDailySeries(22.5, 0.05, 400);
var recallSeries    = genDailySeries(6.3, 0.08, 500);

var pvSeries        = genDailySeries(4580000, 0.06, 600);
var uvSeries        = dauSeries.map(function(v) { return v; });
var avgVisitSeries  = genDailySeries(387, 0.04, 700);
var convRateSeries  = genDailySeries(68, 0.05, 800);
var avgTimeSeries   = genDailySeries(272, 0.03, 900);

var orderSeries     = genDailySeries(238000, 0.06, 1000);
var completeRateSeries = genDailySeries(823, 0.02, 1100);
var gmvSeries       = orderSeries.map(function(v) { return Math.round(v * 36.0); });
var aspSeries       = genDailySeries(359, 0.03, 1200);
var orderConvSeries = genDailySeries(895, 0.02, 1300);

var costSeries      = genDailySeries(486000, 0.10, 1400);
var roiSeries       = genDailySeries(485, 0.12, 1500);
var couponSeries    = genDailySeries(321000, 0.09, 1600);
var couponUseSeries = genDailySeries(415, 0.05, 1700);
var cacSeries       = genDailySeries(832, 0.08, 1800);

// 日指标访问器
var dailyMetrics = {
  dau:            { series: dauSeries, format: function(v) { return (v/1e4).toFixed(1)+'万'; } },
  newUser:        { series: newUserSeries, format: function(v) { return (v/1e4).toFixed(2)+'万'; } },
  ret1:           { series: ret1Series, format: function(v) { return v.toFixed(1)+'%'; } },
  ret7:           { series: ret7Series, format: function(v) { return v.toFixed(1)+'%'; } },
  recall:         { series: recallSeries, format: function(v) { return v.toFixed(1)+'%'; } },
  pv:             { series: pvSeries, format: function(v) { return (v/1e4).toFixed(0)+'万'; } },
  uv:             { series: uvSeries, format: function(v) { return (v/1e4).toFixed(1)+'万'; } },
  avgVisit:       { series: avgVisitSeries, format: function(v) { return (v/100).toFixed(2)+'次'; } },
  convRate:       { series: convRateSeries, format: function(v) { return (v/10).toFixed(1)+'%'; } },
  avgTime:        { series: avgTimeSeries, format: function(v) { var m=Math.floor(v/60); var s=v%60; return m+':'+('0'+s).slice(-2); } },
  orders:         { series: orderSeries, format: function(v) { return (v/1e4).toFixed(1)+'万'; } },
  completeRate:   { series: completeRateSeries, format: function(v) { return (v/10).toFixed(1)+'%'; } },
  gmv:            { series: gmvSeries, format: function(v) { return (v/1e4).toFixed(0)+'万'; } },
  asp:            { series: aspSeries, format: function(v) { return (v/100).toFixed(1)+'元'; } },
  orderConv:      { series: orderConvSeries, format: function(v) { return (v/10).toFixed(1)+'%'; } },
  cost:           { series: costSeries, format: function(v) { return (v/1e4).toFixed(1)+'万'; } },
  roi:            { series: roiSeries, format: function(v) { return (v/100).toFixed(2); } },
  coupon:         { series: couponSeries, format: function(v) { return (v/1e4).toFixed(1)+'万'; } },
  couponUse:      { series: couponUseSeries, format: function(v) { return (v/10).toFixed(1)+'%'; } },
  cac:            { series: cacSeries, format: function(v) { return (v/100).toFixed(2)+'元'; } }
};

// 计算日环比 (期数 index 对应30天数组的下标, latest=29 即最新一天)
function calcDoD(series, dayIndex) {
  if (dayIndex <= 0) return null;
  var today = series[dayIndex];
  var yesterday = series[dayIndex - 1];
  if (!yesterday || yesterday === 0) return null;
  return ((today - yesterday) / yesterday * 100);
}

// 计算周同比（与7天前对比）
function calcWoW(series, dayIndex) {
  if (dayIndex < 7) return null;
  var today = series[dayIndex];
  var lastWeek = series[dayIndex - 7];
  if (!lastWeek || lastWeek === 0) return null;
  return ((today - lastWeek) / lastWeek * 100);
}

// 周环比（本周均值 vs 上周均值）
function calcWoW_weekly(series, endDayIndex) {
  if (endDayIndex < 13) return null; // need at least 14 days
  var thisWeekSum = 0, lastWeekSum = 0;
  for (var i = 0; i < 7; i++) {
    thisWeekSum += series[endDayIndex - i];
    lastWeekSum += series[endDayIndex - 7 - i];
  }
  if (lastWeekSum === 0) return null;
  return ((thisWeekSum - lastWeekSum) / lastWeekSum * 100);
}

// ============================================================
// KPI 卡片配置
// ============================================================
var kpiConfigs = {
  user: [
    { id: 'dau',        label: 'DAU（日活跃用户）',  metric: 'dau' },
    { id: 'newUser',    label: '新注册用户',         metric: 'newUser' },
    { id: 'ret1',       label: '次日留存率',         metric: 'ret1' },
    { id: 'ret7',       label: '7日留存率',          metric: 'ret7' },
    { id: 'recall',     label: '沉默用户召回率',     metric: 'recall' }
  ],
  traffic: [
    { id: 'pv',         label: 'PV（页面浏览量）',   metric: 'pv' },
    { id: 'uv',         label: 'UV（独立访客）',     metric: 'uv' },
    { id: 'avgVisit',   label: '人均访问次数',       metric: 'avgVisit' },
    { id: 'convRate',   label: '访问-下单转化率',    metric: 'convRate' },
    { id: 'avgTime',    label: '平均停留时长',       metric: 'avgTime' }
  ],
  order: [
    { id: 'orders',     label: '有效订单量',         metric: 'orders' },
    { id: 'completeRate', label: '完单率',           metric: 'completeRate' },
    { id: 'gmv',        label: 'GMV（交易额）',      metric: 'gmv' },
    { id: 'asp',        label: '客单价',             metric: 'asp' },
    { id: 'orderConv',  label: '下单-完单转化率',    metric: 'orderConv' }
  ],
  marketing: [
    { id: 'cost',       label: '营销总费用',         metric: 'cost' },
    { id: 'roi',        label: '营销 ROI',           metric: 'roi' },
    { id: 'coupon',     label: '优惠券发放量',       metric: 'coupon' },
    { id: 'couponUse',  label: '优惠券核销率',       metric: 'couponUse' },
    { id: 'cac',        label: '新客获客成本（CAC）', metric: 'cac' }
  ]
};

// 渲染单个tab的KPI卡片
function renderKpiCards(tabId) {
  var container = document.getElementById('kpi-' + tabId);
  var configs = kpiConfigs[tabId];
  var dayIndex = currentMode === 'daily' ? 29 : 29; // 最新一天或最近7天最后一天

  var html = '';
  configs.forEach(function(cfg) {
    var m = dailyMetrics[cfg.metric];
    var series = m.series;
    var currentVal, displayVal;

    if (currentMode === 'daily') {
      // 日视图：显示最新一天的值
      currentVal = series[dayIndex];
      displayVal = m.format(currentVal);

      var dod = calcDoD(series, dayIndex);
      var wow = calcWoW(series, dayIndex);

      var dodHtml = '';
      if (dod !== null) {
        var dodCls = dod >= 0 ? 'up' : 'down';
        var dodArrow = dod >= 0 ? '↑' : '↓';
        dodHtml = '<div class="change '+dodCls+'"><span class="arrow">'+dodArrow+'</span> '+Math.abs(dod).toFixed(1)+'% 日环比</div>';
      } else {
        dodHtml = '<div class="change">日环比 --</div>';
      }

      var wowHtml = '';
      if (wow !== null) {
        var wowCls = wow >= 0 ? 'up' : 'down';
        var wowArrow = wow >= 0 ? '↑' : '↓';
        wowHtml = '<div class="change '+wowCls+'"><span class="arrow">'+wowArrow+'</span> '+Math.abs(wow).toFixed(1)+'% 周同比</div>';
      } else {
        wowHtml = '<div class="change">周同比 --</div>';
      }

      html += '<div class="kpi-card">' +
        '<div class="label">'+cfg.label+'</div>' +
        '<div class="value">'+displayVal+'</div>' +
        dodHtml +
        wowHtml +
        '</div>';
    } else {
      // 周视图：显示最近7天汇总/均值
      var sum7 = 0;
      for (var i = 0; i < 7; i++) {
        // 对于比率类指标用均值，绝对值用汇总
        sum7 += series[dayIndex - i];
      }
      var avg7 = sum7 / 7;

      // 绝对值用汇总 (dau, pv, uv, orders, gmv, cost, coupon 等)
      var isAbsolute = ['dau','pv','uv','orders','gmv','cost','coupon'].indexOf(cfg.metric) >= 0;
      var isAvg = ['avgVisit','avgTime','asp'].indexOf(cfg.metric) >= 0;

      if (isAbsolute) {
        displayVal = m.format(sum7);
      } else if (isAvg) {
        displayVal = m.format(avg7);
      } else {
        // 比率类用均值
        displayVal = m.format(avg7);
      }

      var wowW = calcWoW_weekly(series, dayIndex);
      var wowHtml = '';
      if (wowW !== null) {
        var wCls = wowW >= 0 ? 'up' : 'down';
        var wArrow = wowW >= 0 ? '↑' : '↓';
        wowHtml = '<div class="change '+wCls+'"><span class="arrow">'+wArrow+'</span> '+Math.abs(wowW).toFixed(1)+'% 周环比</div>';
      } else {
        wowHtml = '<div class="change">周环比 --</div>';
      }

      html += '<div class="kpi-card">' +
        '<div class="label">'+cfg.label+'（近7天'+(isAbsolute?'汇总':(isAvg?'均值':'均值'))+'）</div>' +
        '<div class="value">'+displayVal+'</div>' +
        wowHtml +
        '</div>';
    }
  });
  container.innerHTML = html;
}

// 渲染所有已激活tab的KPI卡片
function renderAllKpis() {
  Object.keys(kpiConfigs).forEach(function(tabId) {
    renderKpiCards(tabId);
  });
}

// ============================================================
// 图表工具函数
// ============================================================
const BLUE = '#2563eb', BLUE_L = '#93b4f5';
const CYAN = '#0ea5e9', TEAL = '#14b8a6';
const RED = '#e74c3c', ORANGE = '#f39c12', GREEN = '#27ae60', PURPLE = '#8b5cf6';
const COLORS7 = ['#E74C3C','#F39C12','#3498DB','#2ECC71','#9B59B6','#1ABC9C','#34495E'];

// ---- 计算变化率序列 ----
function dodSeries(dailyArr) {
  return dailyArr.map(function(v, i) {
    if (i === 0) return null;
    var prev = dailyArr[i-1];
    if (!prev || prev === 0) return null;
    return +((v - prev) / prev * 100).toFixed(1);
  });
}
function wowSeries(dailyArr) {
  return dailyArr.map(function(v, i) {
    if (i < 7) return null;
    var prev = dailyArr[i-7];
    if (!prev || prev === 0) return null;
    return +((v - prev) / prev * 100).toFixed(1);
  });
}
function wowWeeklySeries(weeklyArr) {
  return weeklyArr.map(function(v, i) {
    if (i === 0) return null;
    var prev = weeklyArr[i-1];
    if (!prev || prev === 0) return null;
    return +((v - prev) / prev * 100).toFixed(1);
  });
}

function buildDailyCmpSeries(label, dailyArr) {

      lineStyle: { color: PURPLE, type: 'dashed', width: 1.5 }, itemStyle: { color: PURPLE }, symbol: 'triangle', symbolSize: 5 }
  ];
}

// 从周序列构建对比线（周环比）
function buildWeeklyCmpSeries(label, weeklyArr) {
  return [
    { name: label+'周环比(%)', data: wowWeeklySeries(weeklyArr), yAxisIndex: 1,
      lineStyle: { color: ORANGE, type: 'dashed', width: 1.5 }, itemStyle: { color: ORANGE }, symbol: 'diamond', symbolSize: 5 }
  ];
}

function mkLine(domId, xData, series, opts) {
  var dom = document.getElementById(domId);
  var inst = echarts.getInstanceByDom(dom);
  if (inst) inst.dispose();
  var c = echarts.init(dom);

  // 如果已有 series 使用了 yAxisIndex:1（双轴），比较线改用 yAxisIndex:2
  var hasRight = series.some(function(s) { return s.yAxisIndex >= 1; });
  var cmpIdx = hasRight ? 2 : 1;

  // 处理对比线
  var allSeries = series.slice();
  var yAxisArr = [{ type: 'value', axisLabel: { formatter: opts.yFmt || '{value}' } }];
  var gridRight = 30;

  if (opts.comparisonSeries && opts.comparisonSeries.length > 0) {
    gridRight = hasRight ? 80 : 65;
    opts.comparisonSeries.forEach(function(s) {
      s.yAxisIndex = opts.comparisonYAxisIndex || cmpIdx;
      allSeries.push(Object.assign({ type: 'line', smooth: true, symbol: 'circle', symbolSize: 4 }, s));
    });
    // 比较线右Y轴（%）
    yAxisArr.push({
      type: 'value', axisLabel: { formatter: '{value}%', fontSize: 10 },
      splitLine: { show: false }
    });
    // 如果主系列已有右轴，需要额外加一个
    if (hasRight) {
      yAxisArr.splice(1, 0, {
        type: 'value', axisLabel: { formatter: opts.y2Fmt || '{value}', fontSize: 10 },
        splitLine: { show: false }
      });
      // 把原来 yAxisIndex=1 的 series 改成 yAxisIndex=1（现在在位置1）
      // yAxisIndex=2 变成比较线%
      allSeries.forEach(function(s) {
        if (s.yAxisIndex >= 1 && !opts.comparisonSeries.some(function(c) { return c.name === s.name; })) {
          s.yAxisIndex = 1;
        }
      });
      // 比较线用 yAxisIndex=2
      allSeries.forEach(function(s) {
        if (opts.comparisonSeries.some(function(c) { return c.name === s.name; })) {
          s.yAxisIndex = 2;
        }
      });
    }
  } else if (hasRight) {
    yAxisArr.push({
      type: 'value', axisLabel: { formatter: opts.y2Fmt || '{value}', fontSize: 10 },
      splitLine: { show: false }
    });
    gridRight = 65;
  }

  c.setOption({
    tooltip: { trigger: 'axis' },
    legend: opts.legend || { show: true, bottom: 0, textStyle: { fontSize: 10 } },
    grid: { left: 50, right: gridRight, top: 20, bottom: (opts.legend && opts.legend.show !== false ? 45 : 20) },
    xAxis: { type: 'category', data: xData, axisLabel: { rotate: 45, fontSize: 10 } },
    yAxis: yAxisArr,
    series: allSeries
  });
  return c;
}

function mkBar(domId, xData, series, opts) {
  var dom = document.getElementById(domId);
  var inst = echarts.getInstanceByDom(dom);
  if (inst) inst.dispose();
  var c = echarts.init(dom);

  var allSeries = series.map(function(s) {
    return Object.assign({ type: 'bar', barMaxWidth: 40 }, s);
  });
  var yAxisArr = [{ type: 'value', axisLabel: { formatter: opts.yFmt || '{value}' } }];
  var gridRight = 30;

  if (opts.comparisonSeries && opts.comparisonSeries.length > 0) {
    gridRight = 65;
    opts.comparisonSeries.forEach(function(s) {
      s.yAxisIndex = 1;
      allSeries.push(Object.assign({ type: 'line', smooth: true, symbol: 'circle', symbolSize: 4 }, s));
    });
    yAxisArr.push({
      type: 'value', axisLabel: { formatter: '{value}%', fontSize: 10 },

    });
  }

  c.setOption({
    tooltip: { trigger: 'axis' },

// 按周聚合日序列
function dailyToWeekly(series) {
  // 30天 → 5周 (W18: idx 0-6, W19: 7-13, W20: 14-20, W21: 21-27, W22: 28-29+前面补)
  // 简化：最后7天作为W22，往前推
  var weeks = [];
  var weekStarts = [0, 7, 14, 21, 25]; // approximate
  for (var w = 0; w < 5; w++) {
    var start = weekStarts[w];
    var end = w < 4 ? weekStarts[w+1] : 30;
    var sum = 0;
    for (var i = start; i < end; i++) sum += series[i];
    weeks.push(Math.round(sum / (end - start))); // 日均
  }
  return weeks;
}

    'title-mkt-roi': 'ROI 日趋势'
  },
  weekly: {
    'title-user-dau': 'DAU 周趋势（近5周）',
    'title-user-retention': '新注册 & 留存率周趋势',
    'title-traffic-pvuv': 'PV / UV 周趋势（近5周）',
    'title-order-daily': '订单量周趋势（近5周）',
    'title-order-gmv': 'GMV & 客单价周趋势',
    'title-mkt-cost': '营销费用周趋势（近5周）',
    'title-mkt-roi': 'ROI 周趋势'
  }
};

function updateChartTitles() {
  var titles = chartTitles[currentMode];
  Object.keys(titles).forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.textContent = titles[id];
  });
}

// ============================================================
// 模式切换
// ============================================================
function switchMode(mode) {
  if (currentMode === mode) return;
  currentMode = mode;

  // 更新视图提示
  var hint = document.getElementById('view-mode-hint');
  hint.textContent = mode === 'daily' ? '日环比+周同比' : '周环比';
  hint.className = 'view-mode-hint ' + (mode === 'daily' ? 'daily' : 'weekly');

  // 更新图表标题
  updateChartTitles();

  // 重新渲染KPI卡片
  renderAllKpis();

  // 重新渲染图表
  renderAllCharts();
}

// ============================================================
// 事件绑定
// ============================================================
function detectMode() {
  var s = document.getElementById('sel-start').value;
  var e = document.getElementById('sel-end').value;
  if (!s || !e) return currentMode;
  return (s === e) ? 'daily' : 'weekly';
}

function onDateChange() {
  var newMode = detectMode();
  if (newMode !== currentMode) {
    switchMode(newMode);
  } else {
    renderAllKpis();
    renderAllCharts();
  }
}

document.getElementById('sel-start').addEventListener('change', onDateChange);
document.getElementById('sel-end').addEventListener('change', onDateChange);

document.getElementById('btn-refresh').addEventListener('click', function() {
  onDateChange();
});

// ============================================================
// 初始渲染
// ============================================================
renderAllKpis();
updateChartTitles();
renderAllCharts();

// ============================================================
// Resize
// ============================================================
window.addEventListener('resize', function() {
  var ids = [
    'chart-user-dau','chart-user-segment','chart-user-retention','chart-user-active-dist',
    'chart-traffic-pvuv','chart-traffic-funnel','chart-traffic-source','chart-traffic-page',
    'chart-order-daily','chart-order-gmv','chart-order-biz','chart-order-status',
    'chart-mkt-cost','chart-mkt-roi','chart-mkt-type','chart-mkt-user','chart-mkt-channel'
  ];
  ids.forEach(function(id) {
    var dom = document.getElementById(id);
    if (dom) {
      var inst = echarts.getInstanceByDom(dom);
      if (inst) inst.resize();
    }
  });
  // resize all echarts instances (including newly created ones)
  var allDoms = document.querySelectorAll('.chart-box');
  allDoms.forEach(function(dom) {
    var inst = echarts.getInstanceByDom(dom);
    if (inst) inst.resize();
  });
});
</script>
</body>
</html>
